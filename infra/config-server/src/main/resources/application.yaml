spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Указываем серверу искать конфиги в своих ресурсах, подставляя имя обратившегося клиента
          searchLocations:
            - classpath:config/telemetry/{application}

server:
  port: 0 # случайный
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/